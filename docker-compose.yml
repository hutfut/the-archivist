services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: notebooklm
      POSTGRES_PASSWORD: notebooklm
      POSTGRES_DB: notebooklm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebooklm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://notebooklm:notebooklm@db:5432/notebooklm
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
