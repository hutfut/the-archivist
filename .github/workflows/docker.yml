name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "**/Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
